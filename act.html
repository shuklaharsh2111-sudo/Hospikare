<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <title>Activities</title>
    <link rel="stylesheet"
    type="text/css"
    href="/css/act.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <nav id="navbar">
        <div id="leftNavbar">
            <div id="logoBox">
                <img
                    src="/assets/logo.png"
                    id="logoImage"
                >
            </div>
        </div>
        <div id="centerNavbar">
            <div class="navItem activeNav">
                <i class="fa-solid fa-box"></i>
                <span>
                    Orders
                </span>
            </div>
            <div class="navItem">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>
                    History
                </span>
            </div>
            <div class="navItem">
                <i class="fa-solid fa-credit-card"></i>
                <span>
                    Payment
                </span>
            </div>
            <div class="navItem">
                <i class="fa-solid fa-file-circle-check"></i>
                <span>
                    Invoice
                </span>
            </div>
        </div>
    </nav>
    <div id="mainContainer">
    </div>

    <script src="/js/act.js"></script>
</body>
</html>
